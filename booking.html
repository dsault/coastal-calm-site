<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking | Coastal Calm Resort</title>
    <meta name="description" content="Book your stay at Coastal Calm Resort." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>Booking System</h1>
        <p class="tagline">Reserve your next coastal retreat</p>
      </div>
    </header>

    <main class="container home-grid">
      <section class="card">
        <nav aria-label="Site navigation" class="page-nav">
          <a href="index.html">Home</a>
          <a href="gallery.html">Gallery</a>
          <a href="rooms.html">Rooms</a>
          <a href="booking.html" aria-current="page">Booking</a>
        </nav>
      </section>

      <section class="card">
        <h2>Request a Reservation</h2>
        <form class="booking-form" action="#" method="post">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <label for="checkin">Check-in date</label>
          <input id="checkin" name="checkin" type="date" required />

          <label for="checkout">Check-out date</label>
          <input id="checkout" name="checkout" type="date" required />

          <label for="roomType">Room type</label>
          <select id="roomType" name="roomType" required>
            <option value="">Select a room</option>
            <option>Ocean View Suite</option>
            <option>Family Garden Room</option>
            <option>Cozy Standard Room</option>
          </select>

          <label for="notes">Special requests</label>
          <textarea id="notes" name="notes" rows="4" placeholder="Let us know anything we should prepare."></textarea>

          <button type="submit">Submit Booking Request</button>
        </form>
        <p class="form-note">This is a demo form. Connect it to your backend/email handler to receive submissions.</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small>© <span id="year"></span> Coastal Calm Resort</small>
      </div>
    </footer>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
