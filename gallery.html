<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | D&D Coastal Calm Resort</title>
    <meta name="description" content="Photos of D&D Coastal Calm Resort – pool, gardens, ocean views and more." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="logo-link">
          <img
            src="assets/pictures/FullLogo_Transparent_NoBuffer.png"
            alt="D&D Coastal Calm Resort logo"
            class="logo"
          />
          <div class="logo-text">
            D&D Coastal Calm
            <span>Camotes Islands, Cebu</span>
          </div>
        </a>
        <nav class="main-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="gallery.html" aria-current="page">Gallery</a>
          <a href="rooms.html">Rooms</a>
          <a href="booking.html">Booking</a>
        </nav>
      </div>
    </header>

    <main class="container home-grid">
      <section class="card">
        <h2>Resort Gallery</h2>
        <p style="color: var(--muted); margin-top: 0;">
          A glimpse of life at Coastal Calm – from the pool and gardens to the coastline.
        </p>

        <div class="gallery-grid" id="gallery-grid">
          <!-- Images are loaded from the list below -->
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <strong>D&D Coastal Calm Resort</strong>
        <p class="footer-location">
          Mercedes, Poro · Camotes Islands, Cebu, Philippines
        </p>
        <small>© <span id="year"></span> D&D Coastal Calm Resort</small>
      </div>
    </footer>

    <script>
      // ============================================
      // GALLERY IMAGES
      // Add new photos here after uploading them to assets/gallery/
      // ============================================
      const galleryImages = [
        // Existing photos (kept in assets/pictures for now)
        { src: "assets/pictures/air view.jpg", caption: "Resort from above" },
        { src: "assets/pictures/gallery-pool.jpeg", caption: "Infinity pool" },
        { src: "assets/pictures/gallery-gazebo.jpeg", caption: "Garden gazebo" },
        { src: "assets/pictures/gallery-hearts.jpeg", caption: "Resort grounds" },
        { src: "assets/pictures/WhatsApp Image 2026-07-13 at 10.11.16.jpeg", caption: "Event atmosphere" },

        // ---- Add new photos below this line ----
        // Example:
        // { src: "assets/gallery/my-new-photo.jpg", caption: "Sunset over the pool" },
      ];

      // Render the gallery
      const grid = document.getElementById("gallery-grid");
      galleryImages.forEach((item) => {
        const figure = document.createElement("figure");
        figure.innerHTML = `
          <img src="${item.src}" alt="${item.caption}" loading="lazy" />
          <figcaption>${item.caption}</figcaption>
        `;
        grid.appendChild(figure);
      });

      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
