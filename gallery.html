<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | D&D Coastal Calm Resort</title>
    <meta name="description" content="Photos of D&D Coastal Calm Resort – pool, gardens, ocean views, team and more." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="logo-link">
          <img
            src="assets/pictures/FullLogo_Transparent_NoBuffer.png"
            alt="D&D Coastal Calm Resort logo"
            class="logo"
          />
          <div class="logo-text">
            D&D Coastal Calm
            <span>Camotes Islands, Cebu</span>
          </div>
        </a>
        <nav class="main-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="gallery.html" aria-current="page">Gallery</a>
          <a href="rooms.html">Rooms</a>
          <a href="booking.html">Booking</a>
        </nav>
      </div>
    </header>

    <main class="container home-grid">
      <section class="card">
        <h2>Resort Gallery</h2>
        <p style="color: var(--muted); margin-top: 0;">
          A glimpse of life at Coastal Calm – the pool, gardens, amenities, team, and special moments.
        </p>

        <div class="gallery-grid" id="gallery-grid">
          <!-- Images loaded from the list below -->
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <strong>D&D Coastal Calm Resort</strong>
        <p class="footer-location">
          Mercedes, Poro · Camotes Islands, Cebu, Philippines
        </p>
        <small>© <span id="year"></span> D&D Coastal Calm Resort</small>
      </div>
    </footer>

    <script>
      // ============================================
      // GALLERY IMAGES
      // Add new photos here after uploading them to assets/gallery/
      // ============================================
      const galleryImages = [
        { src: "assets/pictures/air view.jpg", caption: "Resort aerial view" },
        { src: "assets/gallery/the_pool.jpeg", caption: "Infinity pool with ocean view & water slide" },
        { src: "assets/gallery/gallery-pool.jpeg", caption: "Infinity pool at dusk" },
        { src: "assets/gallery/jacuzzi.jpeg", caption: "Oceanview jacuzzi" },
        { src: "assets/gallery/hands_fountain.jpeg", caption: "Iconic hands sculpture at sunset" },
        { src: "assets/gallery/gallery-gazebo.jpeg", caption: "Bamboo gazebo – perfect for gatherings" },
        { src: "assets/gallery/billiards.jpeg", caption: "Billiards area under the thatched roof" },
        { src: "assets/gallery/hearts.jpeg", caption: "Heart-shaped seating photo spot" },
        { src: "assets/gallery/gallery-hearts.jpeg", caption: "Resort grounds & photo moments" },
        { src: "assets/gallery/ribbon_cutting.jpeg", caption: "Soft opening ribbon cutting" },
        { src: "assets/gallery/the_team.jpeg", caption: "Our wonderful team" },

        // ---- Add new photos below this line ----
        // { src: "assets/gallery/your-new-photo.jpg", caption: "Description" },
      ];

      // Render the gallery
      const grid = document.getElementById("gallery-grid");
      galleryImages.forEach((item) => {
        const figure = document.createElement("figure");
        figure.innerHTML = `
          <img
            src="${item.src}"
            alt="${item.caption}"
            loading="lazy"
            decoding="async"
          />
          <figcaption>${item.caption}</figcaption>
        `;
        grid.appendChild(figure);
      });

      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
