<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Coastal Calm Resort</title>
    <meta name="description" content="Browse photos of Coastal Calm Resort." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>Resort Picture Gallery</h1>
        <p class="tagline">A glimpse of your coastal escape</p>
      </div>
    </header>

    <main class="container home-grid">
      <section class="card">
        <nav aria-label="Site navigation" class="page-nav">
          <a href="index.html">Home</a>
          <a href="gallery.html" aria-current="page">Gallery</a>
          <a href="rooms.html">Rooms</a>
          <a href="booking.html">Booking</a>
        </nav>
      </section>

      <section class="card">
        <h2>Featured Photos</h2>
        <div class="gallery-grid">
          <figure>
            <img src="assets/pictures/air view.jpg" alt="Air view of Coastal Calm Resort" class="feature-image" />
            <figcaption>Resort from above</figcaption>
          </figure>
          <figure>
            <img src="assets/pictures/gallery-gazebo.jpeg" alt="Gazebo at Coastal Calm Resort" class="feature-image" />
            <figcaption>Garden gazebo</figcaption>
          </figure>
          <figure>
            <img src="assets/pictures/WhatsApp Image 2026-07-13 at 10.11.16.jpeg" alt="Upcoming event scene" class="feature-image" />
            <figcaption>Upcoming event preview</figcaption>
          </figure>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small>© <span id="year"></span> Coastal Calm Resort</small>
      </div>
    </footer>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
